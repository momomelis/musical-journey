<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momo Candie Girls - Summon Your Oracle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: linear-gradient(135deg, #0a0015 0%, #1a0030 50%, #2d0050 100%);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Particle background effect */
        #particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 182, 193, 0.5);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 20, 147, 0.05);
            border: 2px solid rgba(255, 20, 147, 0.3);
            border-radius: 20px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3em;
            font-weight: 900;
            background: linear-gradient(45deg, #ff1493, #ff69b4, #ffc0cb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 20, 147, 0.5);
        }

        .tagline {
            font-size: 1.2em;
            color: #ffc0cb;
            margin-top: 10px;
        }

        .wallet-status {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 10px;
            display: inline-block;
        }

        /* Minting section */
        .mint-section {
            background: rgba(255, 20, 147, 0.05);
            border: 2px solid rgba(255, 20, 147, 0.3);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            margin-bottom: 40px;
        }

        .mint-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 20, 147, 0.3);
            text-align: center;
        }

        .stat-label {
            color: #ffc0cb;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #ff69b4;
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
            border: 1px solid rgba(255, 20, 147, 0.3);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff1493, #ff69b4);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Quantity selector */
        .quantity-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
        }

        .quantity-btn {
            background: rgba(255, 20, 147, 0.2);
            border: 2px solid #ff1493;
            color: #fff;
            font-size: 2em;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
        }

        .quantity-btn:hover {
            background: #ff1493;
            transform: scale(1.1);
        }

        .quantity-display {
            font-size: 3em;
            font-weight: bold;
            color: #ff69b4;
            min-width: 100px;
            text-align: center;
        }

        /* Mint button */
        .mint-button {
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            border: none;
            color: white;
            padding: 20px 60px;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.5);
            display: block;
            margin: 0 auto;
        }

        .mint-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 20, 147, 0.8);
        }

        .mint-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Connect wallet button */
        .connect-wallet-btn {
            background: linear-gradient(45deg, #00ff00, #00cc00);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .connect-wallet-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.8);
        }

        /* Leaderboard */
        .leaderboard {
            background: rgba(255, 20, 147, 0.05);
            border: 2px solid rgba(255, 20, 147, 0.3);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .leaderboard-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2em;
            text-align: center;
            margin-bottom: 30px;
            color: #ff69b4;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(255, 20, 147, 0.3);
            transition: all 0.3s;
        }

        .leaderboard-entry:hover {
            border-color: #ff1493;
            transform: translateX(5px);
        }

        .rank {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff69b4;
            min-width: 50px;
        }

        .address {
            flex: 1;
            font-family: 'Space Mono', monospace;
            color: #ffc0cb;
        }

        .amount {
            font-weight: bold;
            color: #fff;
            font-size: 1.2em;
        }

        /* Reveal animation */
        .reveal-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .reveal-content {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            background: linear-gradient(135deg, #1a0030, #2d0050);
            border: 3px solid #ff1493;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 20, 147, 0.5);
        }

        .reveal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ff69b4;
        }

        .reveal-image {
            width: 300px;
            height: 300px;
            margin: 20px auto;
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10em;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .close-reveal {
            margin-top: 30px;
            background: rgba(255, 20, 147, 0.3);
            border: 2px solid #ff1493;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2em;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .logo {
                font-size: 2em;
            }

            .mint-section {
                padding: 20px;
            }

            .quantity-display {
                font-size: 2em;
            }

            .mint-button {
                font-size: 1.2em;
                padding: 15px 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Particle background -->
    <div id="particles"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">🍓 MOMO CANDIE GIRLS</div>
            <div class="tagline">Summon Your Cyberpunk Period Oracle Companion</div>

            <div id="walletSection">
                <button class="connect-wallet-btn" onclick="connectWallet()">
                    Connect Wallet
                </button>
            </div>
        </div>

        <!-- Minting Section -->
        <div class="mint-section">
            <div class="mint-stats">
                <div class="stat-box">
                    <div class="stat-label">Total Minted</div>
                    <div class="stat-value" id="totalMinted">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Max Supply</div>
                    <div class="stat-value">888</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Price</div>
                    <div class="stat-value">0.08 ETH</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Your Balance</div>
                    <div class="stat-value" id="userBalance">0</div>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar" style="width: 0%">
                    0%
                </div>
            </div>

            <div class="quantity-selector">
                <button class="quantity-btn" onclick="changeQuantity(-1)">-</button>
                <div class="quantity-display" id="quantity">1</div>
                <button class="quantity-btn" onclick="changeQuantity(1)">+</button>
            </div>

            <button class="mint-button" id="mintButton" onclick="mintNFT()" disabled>
                Connect Wallet to Mint
            </button>
        </div>

        <!-- Leaderboard -->
        <div class="leaderboard">
            <div class="leaderboard-title">🏆 Top Collectors</div>
            <div id="leaderboardList"></div>
        </div>
    </div>

    <!-- Reveal Modal -->
    <div class="reveal-container" id="revealModal">
        <div class="reveal-content">
            <div class="reveal-title">✨ Summoning Complete! ✨</div>
            <div class="reveal-image">🍓</div>
            <div style="font-size: 1.2em; margin: 20px 0; color: #ffc0cb;">
                <div id="revealMessage">Your Momo Candie Girl has arrived!</div>
                <div style="margin-top: 10px; font-size: 0.9em;">
                    Token ID: <span id="revealTokenId" style="color: #ff69b4; font-weight: bold;">#001</span>
                </div>
            </div>
            <button class="close-reveal" onclick="closeReveal()">
                Access Your Oracle
            </button>
        </div>
    </div>

    <script src="src/app.js"></script>
</body>
</html>
